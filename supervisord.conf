[supervisord]
nodaemon=true

[program:crontab]
command=crond -l 2 -f -c %(ENV_CRON_PATH)s
stderr_logfile = /var/log/crontab-stderr.log
stdout_logfile = /var/log/crontab-stdout.log

[program:cron-gui]
command=node /cron-gui/app.js
stderr_logfile = /var/log/cron-gui-stderr.log
stdout_logfile = /var/log/cron-gui-stdout.log
