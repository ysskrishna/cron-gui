name: Validate release tag
description: Ensure the release tag is valid semver and matches package.json

inputs:
  tag:
    description: Release tag (e.g. v0.1.0)
    required: true
  base-branch:
    description: Branch that release tags must belong to
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Validate release tag format
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Tag '$TAG' must match vMAJOR.MINOR.PATCH."
          exit 1
        fi

    - name: Verify tag matches package.json version
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        TAG_VERSION="${TAG#v}"
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "::error::Release tag ($TAG_VERSION) does not match package.json ($PKG_VERSION)."
          exit 1
        fi

    - name: Verify tag commit is on base branch
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        set -euo pipefail
        git fetch --no-tags origin "$BASE_BRANCH"
        if ! git merge-base --is-ancestor HEAD FETCH_HEAD; then
          echo "::error::Release tag commit is not contained in origin/$BASE_BRANCH."
          exit 1
        fi
