name: Publish Docker

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (must match package.json), e.g. v0.1.0
        required: true
        type: string

concurrency:
  group: publish-docker-${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ysskrishna/cron-gui
  RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
  DOCKER_CACHE_SCOPE: release-${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}

jobs:
  publish:
    name: Validate, test, and publish image
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 45
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate release tag
        uses: ./.github/actions/validate-release
        with:
          tag: ${{ env.RELEASE_TAG }}
          base-branch: main

      - name: Node quality checks
        uses: ./.github/actions/node-quality
        with:
          node-version: "22"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          TAGS="${IMAGE_NAME}:${VERSION}"
          TAGS+=$'\n'"${IMAGE_NAME}:${MAJOR}.${MINOR}"
          TAGS+=$'\n'"${IMAGE_NAME}:${MAJOR}"
          TAGS+=$'\n'"${IMAGE_NAME}:latest"

          {
            echo "tags<<EOF"
            printf '%s\n' "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=cron-gui
            org.opencontainers.image.description=Web interface for managing cron jobs without editing crontab by hand
            org.opencontainers.image.source=https://github.com/ysskrishna/cron-gui
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ env.DOCKER_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DOCKER_CACHE_SCOPE }}
          provenance: mode=max
          sbom: true
