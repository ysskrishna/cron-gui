name: Docker build (local load)
description: Build a single-platform image and load it into the local Docker daemon

inputs:
  image-tag:
    description: Local image tag
    required: true
  cache-scope:
    description: GHA cache scope for BuildKit layer cache
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: ${{ inputs.image-tag }}
        platforms: linux/amd64
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}
