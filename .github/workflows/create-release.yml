name: Create Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: create-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release from tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Validate release tag
        uses: ./.github/actions/validate-release
        with:
          tag: ${{ github.ref_name }}
          base-branch: main

      - name: Extract changelog notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/./,$!d')
          if [ -z "$NOTES" ]; then
            echo "::error::No CHANGELOG.md section for version $VERSION"
            exit 1
          fi
          {
            echo "body<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ steps.notes.outputs.prerelease == 'true' }}
          draft: false
