name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Node quality checks
        uses: ./.github/actions/node-quality
        with:
          node-version: ${{ matrix.node-version }}

  docker-build:
    name: Verify Docker image builds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        uses: ./.github/actions/docker-build-local
        with:
          image-tag: cron-gui:ci
          cache-scope: ci
