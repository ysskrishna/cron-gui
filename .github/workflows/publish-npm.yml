name: Publish npm

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (must match package.json), e.g. v0.1.0
        required: true
        type: string

concurrency:
  group: publish-npm-${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}

jobs:
  publish:
    name: Validate, test, and publish package
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate release tag
        uses: ./.github/actions/validate-release
        with:
          tag: ${{ env.RELEASE_TAG }}
          base-branch: main

      - name: Node quality checks
        uses: ./.github/actions/node-quality
        with:
          node-version: "22"

      - name: Use Node.js 24 for publish
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Publish package
        run: npm publish --provenance --access public
