services:
  cron-gui:
    build: .
    image: ysskrishna/cron-gui
    ports:
      - "8000:8000"
    volumes:
      - cron-gui-data:/cron-gui/crontabs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  cron-gui-data:
